<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estadísticas Entre Semana - Next Level 7</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0a0a;
  font-family: 'Roboto', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  opacity: 0.35;
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.75) 0%,
    rgba(0,0,0,0.55) 40%,
    rgba(0,0,0,0.75) 100%);
  z-index: 1;
}

.container {
  position: relative;
  z-index: 10;
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px 12px 50px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .container { padding: 12px 8px 40px; }

  .stats-table th, .stats-table td {
    padding: 8px 5px;
    font-size: 11px;
  }

  .stats-table th { font-size: 11px; letter-spacing: 0; }

  /* Ocultar columnas menos importantes en móvil */
  .stats-table th:nth-child(5),
  .stats-table td:nth-child(5),
  .stats-table th:nth-child(6),
  .stats-table td:nth-child(6) { display: none; }

  .team-logo-sm { width: 28px; height: 28px; }
  .team-name-td { font-size: 13px; letter-spacing: 0; }
  .rank-badge { font-size: 15px; }
  .pts-cell { font-size: 16px; }
  .team-cell { gap: 6px; }
}

/* ===== HEADER ===== */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 36px;
  text-align: center;
}

.header-logo {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(184,240,48,0.4));
}

.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 8px;
  color: #d4f030;
  text-shadow: 0 0 30px rgba(100,200,0,0.5), 0 3px 10px rgba(0,0,0,0.9);
  line-height: 1;
}

.header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 6px;
  color: #88cc22;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}

.divider {
  width: 200px;
  height: 2px;
  background: linear-gradient(to right, transparent, #b8f030, transparent);
  margin: 4px auto;
}

.btn-refresh {
  background: rgba(184,240,48,0.1);
  border: 1px solid #3a6b1a;
  border-radius: 8px;
  color: #b8f030;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  padding: 8px 20px;
  text-transform: uppercase;
  transition: background 0.2s;
  margin-top: 6px;
}
.btn-refresh:hover { background: rgba(184,240,48,0.2); }

/* ===== TABLE ===== */
.table-wrapper {
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(184,240,48,0.2);
  border-radius: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.stats-table {
  width: 100%;
  border-collapse: collapse;
}

.stats-table thead tr {
  background: rgba(184,240,48,0.1);
  border-bottom: 2px solid rgba(184,240,48,0.3);
}

.stats-table th {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  color: #88cc22;
  padding: 14px 12px;
  text-align: center;
  text-transform: uppercase;
}

.stats-table th.left { text-align: left; }

.stats-table tbody tr {
  border-bottom: 1px solid rgba(58,107,26,0.3);
  transition: background 0.15s;
}

.stats-table tbody tr:last-child { border-bottom: none; }
.stats-table tbody tr:hover { background: rgba(184,240,48,0.05); }

/* Top 3 highlights */
.stats-table tbody tr.pos-1 { background: rgba(255,215,0,0.08); }
.stats-table tbody tr.pos-2 { background: rgba(192,192,192,0.06); }
.stats-table tbody tr.pos-3 { background: rgba(205,127,50,0.06); }

.stats-table td {
  padding: 12px;
  text-align: center;
  color: #ddd;
  font-size: 14px;
}

.stats-table td.left { text-align: left; }

.rank-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  font-weight: bold;
}

.rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
.rank-2 { color: #c0c0c0; text-shadow: 0 0 10px rgba(192,192,192,0.4); }
.rank-3 { color: #cd7f32; text-shadow: 0 0 10px rgba(205,127,50,0.4); }
.rank-other { color: #88cc22; font-family: 'Bebas Neue', sans-serif; font-size: 18px; }

.team-cell {
  display: flex;
  align-items: center;
  gap: 12px;
}

.team-logo-sm {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(184,240,48,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.team-logo-sm img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.team-name-td {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 1px;
  color: #fff;
  text-transform: uppercase;
}

.pts-cell {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: #d4f030;
  text-shadow: 0 0 10px rgba(184,240,48,0.4);
}

.no-jugados {
  color: rgba(255,255,255,0.2);
  font-size: 12px;
  letter-spacing: 2px;
}

.loading {
  text-align: center;
  color: #88cc22;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  padding: 60px;
}

.footer {
  text-align: center;
  margin-top: 30px;
  color: rgba(255,255,255,0.2);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>

  </div>
  <div class="footer">Next Level 7 © 2026 — Liga Varonil Libre</div>
</div>

const CSV_STATS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=325917505&single=true&output=csv';
const CSV_EQUIPOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=1894947293&single=true&output=csv';
const TORNEO = 'Entre Semana';

// subtitulo removed

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,''));
    return obj;
  });
}

async function cargarEstadisticas() {
  const cont = document.getElementById('statsContent');
  cont.innerHTML = '<div class="loading">Cargando estadísticas...</div>';

  try {
    const [resS, resE] = await Promise.all([
      fetch(CSV_STATS + '&t=' + Date.now()),
      fetch(CSV_EQUIPOS + '&t=' + Date.now())
    ]);

    const stats   = parseCSV(await resS.text());
    const equipos = parseCSV(await resE.text());

    // Mapa de logos Y nombres por ID_Equipo
    const logoMap = {};
    const nombreMap = {};
    equipos.forEach(e => { 
      logoMap[String(e.ID_Equipo)] = e.URL || '';
      nombreMap[String(e.ID_Equipo)] = e.Nombre || '';
    });

    // Ordenar por Ranking
    const sorted = stats
      .filter(s => s.Ranking && s.Ranking !== '')
      .sort((a, b) => parseInt(a.Ranking) - parseInt(b.Ranking));

    // Sin juegos
    const sinJuegos = stats.filter(s => !s.Ranking || s.Ranking === '');

    const rankIcon = (r) => {
      const n = parseInt(r);
      if (n === 1) return `<span class="rank-badge rank-1">🥇</span>`;
      if (n === 2) return `<span class="rank-badge rank-2">🥈</span>`;
      if (n === 3) return `<span class="rank-badge rank-3">🥉</span>`;
      return `<span class="rank-other">${n}</span>`;
    };

    const rowClass = (r) => {
      const n = parseInt(r);
      if (n === 1) return 'pos-1';
      if (n === 2) return 'pos-2';
      if (n === 3) return 'pos-3';
      return '';
    };

    const logoHTML = (idEquipo) => {
      const url = logoMap[String(idEquipo)] || '';
      return url
        ? `<img src="${url}" onerror="this.style.display='none'">`
        : '⚽';
    };

    let html = `
      <table class="stats-table">
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th class="left">Equipo</th>
            <th>JJ</th>
            <th>JG</th>
            <th>JP</th>
            <th>GF</th>
            <th>GC</th>
            <th>DG</th>
            <th>PTS</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(s => `
            <tr class="${rowClass(s.Ranking)}">
              <td>${rankIcon(s.Ranking)}</td>
              <td class="left">
                <div class="team-cell">
                  <div class="team-logo-sm">${logoHTML(s.ID_Equipo)}</div>
                  <div class="team-name-td">${nombreMap[String(s.ID_Equipo)] || s.Nombre}</div>
                </div>
              </td>
              <td>${s.JJ || 0}</td>
              <td>${s.JG || 0}</td>
              <td>${s.JP || 0}</td>
              <td>${s.GF || 0}</td>
              <td>${s.GC || 0}</td>
              <td>${s.DG || 0}</td>
              <td class="pts-cell">${s.PTS || 0}</td>
            </tr>
          `).join('')}
          ${sinJuegos.map(s => `
            <tr>
              <td><span class="no-jugados">—</span></td>
              <td class="left">
                <div class="team-cell">
                  <div class="team-logo-sm">${logoHTML(s.ID_Equipo)}</div>
                  <div class="team-name-td" style="opacity:0.4">${nombreMap[String(s.ID_Equipo)] || s.Nombre}</div>
                </div>
              </td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
              <td class="no-jugados">0</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

    cont.innerHTML = html;

  } catch(e) {
    cont.innerHTML = `<div class="loading">❌ Error: ${e.message}</div>`;
  }
}

cargarEstadisticas();
</script>
